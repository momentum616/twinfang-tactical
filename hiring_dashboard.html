<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hiring Dashboard</title>
  <style>
    :root { --text:#e8edf5; --accent:#7cc4ff; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: #0b0f14;
      color: #e8edf5;
      min-height: 100vh;
    }
    .topnav {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(10px);
      background: rgba(8, 12, 20, 0.78);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .topnav-inner {
      max-width: 1400px;
      margin: 0 auto;
      padding: 14px 24px;
      display: flex;
      gap: 18px;
      align-items: center;
    }
    .topnav a {
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      opacity: 0.8;
    }
    .topnav a.active { opacity: 1; color: var(--accent); }
    .topnav a:hover { opacity: 1; }
    .page-wrap {
      display:grid;
      place-items:center;
      min-height: calc(100vh - 60px);
      padding: 24px;
    }
    .card {
      max-width: 760px;
      width: 100%;
      background: #121923;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.35);
    }
    h1 { margin-top: 0; }
    p { color: #9fb0c7; line-height: 1.7; }
    a {
      display: inline-block;
      margin-top: 12px;
      padding: 12px 16px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      color: #07111a;
      background: linear-gradient(135deg, #7cc4ff, #5eead4);
    }
    code {
      background: rgba(255,255,255,0.06);
      padding: 2px 6px;
      border-radius: 6px;
      color: #e8edf5;
    }
  </style>
</head>
<body>
  <nav class="topnav">
    <div class="topnav-inner">
      <a href="index.html">Home</a>
      <a href="founder_payouts.html">Fund Allocation</a>
      <a href="hiring_dashboard.html" class="active">Recruitment</a>
    </div>
  </nav>
  <div class="page-wrap">
  <div class="card">
    <h1>Hiring Dashboard Placeholder</h1>
    <p>
      This file is included so your GitHub Pages menu works immediately.
      Replace <code>hiring_dashboard.html</code> with your real hiring dashboard export when you are ready.
    </p>
    <a href="index.html">Back to Main Menu</a>
  </div>
  </div>
</body>
</html>
